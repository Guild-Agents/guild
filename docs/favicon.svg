<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c65a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-grad)" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Shield shape -->
  <path d="M32 8 L50 18 L50 34 Q50 48 32 56 Q14 48 14 34 L14 18 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner G letter -->
  <text x="32" y="40" text-anchor="middle" font-family="serif" font-weight="700" font-size="26" fill="#c9a84c">G</text>
</svg>
